<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{% block title %}financiALL{% endblock %}</title>
  <link href="{{ url_for('static', filename='argon/css/argon-dashboard.min.css') }}" rel="stylesheet">
  <style>
    /* Ajustes pontuais que preservam os ganchos de classe/ID já usados pelo
       JS e pelos testes de contrato existentes (status-badge, vazio, etc.),
       sem depender de nenhum asset extra do Argon além do CSS/JS já vendorizados. */
    .status-badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 600; }
    .status-completa { background: #d5f5d5; color: #1a5c1a; }
    .status-pendente_revisao { background: #fff3cd; color: #7a5b00; }
    .vazio { color: #8898aa; }
    .mensagem-sucesso { background: #d5f5d5; color: #1a5c1a; padding: 0.6rem 0.9rem; border-radius: 0.5rem; margin-bottom: 1rem; }
    tr.linha-clicavel { cursor: pointer; }
    .table-responsive-argon { overflow-x: auto; }
    #resultado:empty { display: none; }
    .sidenav .icon-shape { width: 34px; height: 34px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="g-sidenav-show bg-gray-100">
  <aside class="sidenav navbar navbar-vertical navbar-expand-xs border-0 border-radius-xl my-3 fixed-start ms-3 bg-gradient-dark" id="sidenav-main">
    <div class="sidenav-header">
      <span class="p-3 cursor-pointer text-white opacity-8 position-absolute end-0 top-0 d-none d-xl-none" aria-hidden="true" id="iconSidenav">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </span>
      <a class="navbar-brand m-0" href="/">
        <span class="ms-1 font-weight-bold text-white">financiALL</span>
      </a>
    </div>
    <hr class="horizontal light mt-0">
    <div class="collapse navbar-collapse w-auto" id="sidenav-collapse-main">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-white {{ 'active bg-primary' if pagina_ativa == 'importar' else '' }}" href="/">
            <div class="icon icon-shape icon-sm border-radius-md text-center me-2 d-flex align-items-center justify-content-center bg-white">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-dark" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11"/><path d="M8 8l4-4 4 4"/><path d="M5 18h14"/></svg>
            </div>
            <span class="nav-link-text ms-1">Importar</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {{ 'active bg-primary' if pagina_ativa == 'notas' else '' }}" href="/ver/notas">
            <div class="icon icon-shape icon-sm border-radius-md text-center me-2 d-flex align-items-center justify-content-center bg-white">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-dark" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
            </div>
            <span class="nav-link-text ms-1">Notas</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {{ 'active bg-primary' if pagina_ativa == 'categorias' else '' }}" href="/ver/categorias">
            <div class="icon icon-shape icon-sm border-radius-md text-center me-2 d-flex align-items-center justify-content-center bg-white">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-dark" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h8l10 10-8 8L3 11V3z"/><circle cx="7.5" cy="7.5" r="1.3" fill="currentColor" stroke="none"/></svg>
            </div>
            <span class="nav-link-text ms-1">Categorias</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {{ 'active bg-primary' if pagina_ativa == 'pendentes' else '' }}" href="/ver/pendentes">
            <div class="icon icon-shape icon-sm border-radius-md text-center me-2 d-flex align-items-center justify-content-center bg-white">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-dark" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
            </div>
            <span class="nav-link-text ms-1">Pendentes</span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {{ 'active bg-primary' if pagina_ativa == 'resumo' else '' }}" href="/ver/resumo">
            <div class="icon icon-shape icon-sm border-radius-md text-center me-2 d-flex align-items-center justify-content-center bg-white">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="text-dark" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v9l7 4"/></svg>
            </div>
            <span class="nav-link-text ms-1">Resumo</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>
  <main class="main-content position-relative border-radius-lg">
    <nav class="navbar navbar-main navbar-expand-lg px-0 mx-4 shadow-none border-radius-xl" id="navbarBlur" data-scroll="true">
      <div class="container-fluid py-1 px-3">
        <button class="btn btn-outline-primary d-xl-none" type="button" id="iconNavbarSidenav" aria-label="Abrir menu de navegação">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="fw-bold ms-3">{% block titulo_pagina %}financiALL{% endblock %}</span>
      </div>
    </nav>
    <div class="container-fluid py-4">
      {% block content %}{% endblock %}
    </div>
  </main>
  <script src="{{ url_for('static', filename='argon/js/core/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='argon/js/plugins/perfect-scrollbar.min.js') }}"></script>
  <script src="{{ url_for('static', filename='argon/js/argon-dashboard.min.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
