{% extends "base.html" %}
{% block title %}financiALL - Importar{% endblock %}
{% block titulo_pagina %}Importar nota fiscal{% endblock %}
{% block content %}
  <div class="row">
    <div class="col-12 col-lg-6 mb-4">
      <div class="card h-100">
        <div class="card-header pb-0">
          <h6>URL do QR Code ou chave de acesso</h6>
        </div>
        <div class="card-body">
          <form id="form-entrada">
            <div class="input-group input-group-outline mb-3">
              <input type="text" class="form-control" id="entrada" name="entrada" placeholder="Cole a URL do QR Code ou a chave de 44 dígitos" required>
            </div>
            <button type="submit" class="btn bg-gradient-primary w-100 mb-0">Importar</button>
          </form>
        </div>
      </div>
    </div>
    <div class="col-12 col-lg-6 mb-4">
      <div class="card h-100">
        <div class="card-header pb-0">
          <h6>Foto ou PDF do cupom fiscal</h6>
        </div>
        <div class="card-body">
          <form id="form-upload">
            <div class="mb-3">
              <input type="file" class="form-control form-control-lg" id="arquivo" name="arquivo" accept="image/*,application/pdf" capture="environment" required>
            </div>
            <button type="submit" class="btn bg-gradient-primary w-100 mb-0">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="resultado" class="card card-body"></div>
{% endblock %}
{% block extra_scripts %}
  <script>
    const resultado = document.getElementById("resultado");

    function limparResultado() {
      resultado.innerHTML = "";
    }

    function adicionarParagrafo(texto) {
      const p = document.createElement("p");
      p.className = "mb-1";
      p.textContent = texto;
      resultado.appendChild(p);
      return p;
    }

    function adicionarLink(href, texto) {
      const p = document.createElement("p");
      p.className = "mb-0";
      const a = document.createElement("a");
      a.href = href;
      a.textContent = texto;
      p.appendChild(a);
      resultado.appendChild(p);
    }

    document.getElementById("form-entrada").addEventListener("submit", async (evento) => {
      evento.preventDefault();
      const entrada = document.getElementById("entrada").value;
      const resposta = await fetch("/notas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ entrada }),
      });
      const corpo = await resposta.json();
      limparResultado();
      if (corpo.erro) {
        adicionarParagrafo(corpo.erro);
        return;
      }
      adicionarParagrafo(corpo.mensagem);
      if (corpo.nota) {
        adicionarParagrafo(`Emitente: ${corpo.nota.emitente_nome || "não disponível"}`);
      }
      adicionarLink("/ver/notas", "Ver na lista de notas →");
    });

    document.getElementById("form-upload").addEventListener("submit", async (evento) => {
      evento.preventDefault();
      const arquivo = document.getElementById("arquivo").files[0];
      const dados = new FormData();
      dados.append("arquivo", arquivo);
      const resposta = await fetch("/notas/upload", { method: "POST", body: dados });
      const corpo = await resposta.json();
      limparResultado();
      if (corpo.erro) {
        adicionarParagrafo(corpo.erro);
        return;
      }
      adicionarParagrafo(`Arquivo recebido (envio #${corpo.envio_id}).`);
      adicionarLink(`/ver/envios/${corpo.envio_id}`, "Ver status do envio →");
    });
  </script>
{% endblock %}
